---
- name: Create administrative user newadmin
  hosts: servers
  become: true
  vars:
    admin_user: newadmin
    admin_password_plain: "123"
  tasks:
    - name: Add user with sudo membership
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: sudo
        append: true
        shell: /bin/bash
        password: "{{ admin_password_plain | password_hash('sha512') }}"
        create_home: true
