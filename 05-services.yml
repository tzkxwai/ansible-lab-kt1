---
- name: Manage systemd services on target
  hosts: servers
  become: true
  vars:
    demo_service_name: ssh
    demo_service_state: started
    demo_service_enabled: true
  tasks:
    - name: Apply desired state to service
      ansible.builtin.service:
        name: "{{ demo_service_name }}"
        state: "{{ demo_service_state }}"
        enabled: "{{ demo_service_enabled }}"
